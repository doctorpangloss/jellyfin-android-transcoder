name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - name: Build release artifacts
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}" ./scripts/package-release.sh
      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          overwrite_files: true
          files: |
            dist/jellyfin-android-transcoder-*.apk
            dist/jellyfin-android-transcoder-*.aab
            dist/Jellyfin.Plugin.AndroidTranscoder-*.zip
            dist/manifest.json
            dist/SHA256SUMS
