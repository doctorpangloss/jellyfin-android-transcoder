plugins {
    id "com.android.application"
}

android {
    namespace "com.hiddenswitch.androidtranscoder"
    compileSdk 35

    defaultConfig {
        applicationId "com.hiddenswitch.androidtranscoder"
        minSdk 28
        targetSdk 35
        versionCode 1
        versionName "0.1.0"
        ndk {
            abiFilters "arm64-v8a"
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }
}
